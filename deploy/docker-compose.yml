services:
  app:
    build:
      context: ..
      target: server
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.wheee.io}
    restart: unless-stopped
    env_file: .env
    expose:
      - "3001"
    volumes:
      - app-data:/data

  nginx:
    build:
      context: ..
      target: nginx
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.wheee.io}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-etc:/etc/letsencrypt:ro
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
    profiles: ["certbot"]

volumes:
  certbot-etc:
  app-data:
