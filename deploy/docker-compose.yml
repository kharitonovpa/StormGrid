services:
  app:
    build:
      context: ..
      target: server
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.wheee.io}
    restart: unless-stopped
    env_file: .env
    expose:
      - "3001"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./client-dist:/var/www/wheee:ro
      - certbot-etc:/etc/letsencrypt:ro
    depends_on:
      - app

  # Run once to issue certs, then periodically to renew:
  #   docker compose run --rm certbot certonly --webroot -w /var/www/wheee \
  #     -d ru.wheee.com -d api.wheee.com
  certbot:
    image: certbot/certbot
    volumes:
      - ./client-dist:/var/www/wheee
      - certbot-etc:/etc/letsencrypt
    profiles: ["certbot"]

volumes:
  certbot-etc:
