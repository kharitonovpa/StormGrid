map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    server_name ru.wheee.io;
    return 301 https://$host$request_uri;
}

# ── RU frontend: static SPA + WS proxy (HTTPS) ───────────────
server {
    listen 443 ssl http2;
    server_name ru.wheee.io;

    ssl_certificate     /etc/letsencrypt/live/ru.wheee.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ru.wheee.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- Static SPA files ---
    root /var/www/wheee;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|glb)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- API proxy to Polish game server ---
    location /api/ {
        proxy_pass https://64.176.71.39:443/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api.wheee.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # --- WebSocket proxy to Polish game server (via its nginx on 443) ---
    location /ws {
        proxy_pass https://64.176.71.39:443/ws;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api.wheee.io;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
