map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    server_name ru.wheee.io api.wheee.io;
    return 301 https://$host$request_uri;
}

# ── RU frontend: static SPA (HTTPS) ──────────────────────────
server {
    listen 443 ssl;
    server_name ru.wheee.io;

    ssl_certificate     /etc/letsencrypt/live/ru.wheee.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ru.wheee.io/privkey.pem;

    root /var/www/wheee;

    location / {
        try_files $uri /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|glb)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# ── API + WebSocket backend (HTTPS) ───────────────────────────
server {
    listen 443 ssl;
    server_name api.wheee.io;

    ssl_certificate     /etc/letsencrypt/live/ru.wheee.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ru.wheee.io/privkey.pem;

    location /ws {
        proxy_pass http://app:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://app:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
